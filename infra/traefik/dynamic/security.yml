# Configuración dinámica de Traefik — middlewares de seguridad
# Referenciados desde labels de docker-compose.prod.yml:
#   traefik.http.routers.server.middlewares: security-headers@file,api-ratelimit@file

http:
  middlewares:
    security-headers:
      headers:
        # HSTS: forzar HTTPS por 1 año, incluir subdominios
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        # Prevenir clickjacking
        frameDeny: true
        # Prevenir MIME type sniffing
        contentTypeNosniff: true
        # XSS protection (legacy browsers)
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        # CSP: Leptos/WASM requiere wasm-unsafe-eval para ejecutar el módulo WASM.
        # unsafe-inline en style-src: Leptos inyecta estilos inline durante hidratación.
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self' 'wasm-unsafe-eval';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data:;
          font-src 'self';
          connect-src 'self';
          frame-ancestors 'none'

    # Rate limiting para la API: previene brute force y abuso de endpoints costosos
    # (especialmente POST /api/vendors/:id/analyze que encola jobs LLM).
    api-ratelimit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
