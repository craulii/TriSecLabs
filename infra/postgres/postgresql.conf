# postgresql.conf — Tuning para producción Hetzner
# Montado en docker-compose.prod.yml como:
#   volumes:
#     - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
# Activado con:
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf
#
# Ajustar según el tier del VPS. Solo descomentar UN bloque.

# =============================================================================
# CX21 — 4 GB RAM, 2 vCPU (~$6/mes)
# Nota: NO activar el perfil llm en este tier — Mistral Q4 usa ~4.5 GB solo.
# =============================================================================
max_connections = 50          # server pool (max 20) + worker pool (max 20) = 40; margen de 10
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 20MB
maintenance_work_mem = 256MB

# =============================================================================
# CX31 — 8 GB RAM, 4 vCPU (~$10/mes)
# Tier mínimo recomendado con perfil llm activo.
# =============================================================================
# max_connections = 100
# shared_buffers = 2GB
# effective_cache_size = 6GB
# work_mem = 40MB
# maintenance_work_mem = 512MB

# =============================================================================
# CX41 — 16 GB RAM, 8 vCPU (~$19/mes)
# =============================================================================
# max_connections = 200
# shared_buffers = 4GB
# effective_cache_size = 12GB
# work_mem = 80MB
# maintenance_work_mem = 1GB

# =============================================================================
# Diagnóstico — aplicar en todos los tiers
# =============================================================================
log_min_duration_statement = 1000   # loggear queries > 1 segundo
log_checkpoints = on
log_lock_waits = on
wal_level = replica                 # necesario para futura replicación o backups con pg_basebackup
